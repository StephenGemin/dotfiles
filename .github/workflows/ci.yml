name: CI

on:
  pull_request:
  push:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: shellcheck scripts/install_debian.sh scripts/logging.sh

      - name: Check bash script syntax
        run: |
          bash -n scripts/install_debian.sh
          bash -n scripts/logging.sh

  install-linux:
    name: Install check / Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure chezmoi
        run: |
          mkdir -p "$HOME/.config/chezmoi"
          cat > "$HOME/.config/chezmoi/chezmoi.toml" << 'EOF'
          [data]
          email = "ci@example.com"
          name = "CI Test"
          install_host = "home"
          wingit_install_dir = ""
          osid = "linux-ubuntu"
          EOF

      - name: "[Fresh install] Apply dotfiles"
        run: chezmoi apply --source "$GITHUB_WORKSPACE" --exclude externals --verbose

      - name: "[Fresh install] Verify no drift"
        run: chezmoi verify --source "$GITHUB_WORKSPACE" --exclude externals

      - name: "[Upgrade] Re-apply dotfiles"
        run: chezmoi apply --source "$GITHUB_WORKSPACE" --exclude externals

      - name: "[Upgrade] Verify no drift after re-apply"
        run: chezmoi verify --source "$GITHUB_WORKSPACE" --exclude externals

  install-macos:
    name: Install check / macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure chezmoi
        run: |
          mkdir -p "$HOME/.config/chezmoi"
          cat > "$HOME/.config/chezmoi/chezmoi.toml" << 'EOF'
          [data]
          email = "ci@example.com"
          name = "CI Test"
          install_host = "home"
          wingit_install_dir = ""
          osid = "darwin"
          EOF

      - name: "[Fresh install] Apply dotfiles"
        run: chezmoi apply --source "$GITHUB_WORKSPACE" --exclude externals --verbose

      - name: "[Fresh install] Verify no drift"
        run: chezmoi verify --source "$GITHUB_WORKSPACE" --exclude externals

      - name: "[Upgrade] Re-apply dotfiles"
        run: chezmoi apply --source "$GITHUB_WORKSPACE" --exclude externals

      - name: "[Upgrade] Verify no drift after re-apply"
        run: chezmoi verify --source "$GITHUB_WORKSPACE" --exclude externals

  install-windows:
    name: Install check / Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        shell: pwsh
        run: |
          $installDir = "$env:LOCALAPPDATA\Programs\chezmoi"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          (& ([scriptblock]::Create((Invoke-WebRequest -UseBasicParsing 'https://get.chezmoi.io/ps1').Content))) -b $installDir
          "$installDir" | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_PATH

      - name: Configure chezmoi
        shell: pwsh
        run: |
          $configDir = "$env:USERPROFILE\.config\chezmoi"
          New-Item -ItemType Directory -Force -Path $configDir | Out-Null
          $lines = @(
            '[data]',
            'email = "ci@example.com"',
            'name = "CI Test"',
            'install_host = "home"',
            'wingit_install_dir = "C:/Program Files/Git"',
            'osid = "windows"'
          )
          $lines | Set-Content -Path "$configDir\chezmoi.toml" -Encoding utf8

      - name: "[Fresh install] Apply dotfiles"
        shell: pwsh
        run: chezmoi apply --source "$env:GITHUB_WORKSPACE" --exclude externals --verbose

      - name: "[Fresh install] Verify no drift"
        shell: pwsh
        run: chezmoi verify --source "$env:GITHUB_WORKSPACE" --exclude externals

      - name: "[Upgrade] Re-apply dotfiles"
        shell: pwsh
        run: chezmoi apply --source "$env:GITHUB_WORKSPACE" --exclude externals

      - name: "[Upgrade] Verify no drift after re-apply"
        shell: pwsh
        run: chezmoi verify --source "$env:GITHUB_WORKSPACE" --exclude externals
